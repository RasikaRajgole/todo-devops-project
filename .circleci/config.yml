version: 2.1

jobs:
  build-push:
    docker:
      - image: cimg/node:18.20
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Install Dependencies
          command: npm install --legacy-peer-deps
      - run:
          name: Build React App
          command: npm run build
      - run:
          name: Build & Push Docker Image
          command: |
            docker build -t $DOCKERHUB_USERNAME/todo-app:$CIRCLE_SHA1 .
            docker build -t $DOCKERHUB_USERNAME/todo-app:latest .
            echo $DOCKERHUB_PASSWORD | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push $DOCKERHUB_USERNAME/todo-app:$CIRCLE_SHA1
            docker push $DOCKERHUB_USERNAME/todo-app:latest

  update-manifest:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Update k8s image tag
          command: |
            sed -i "s|image: .*todo-app:.*|image: $DOCKERHUB_USERNAME/todo-app:$CIRCLE_SHA1|" k8s/deployment.yaml
            git config user.email "ci@circleci.com"
            git config user.name "CircleCI"
            git add k8s/deployment.yaml
            git commit -m "ci: update image to $CIRCLE_SHA1 [skip ci]"
            git push https://$GITHUB_TOKEN@github.com/RasikaRajgole/todo-devops-project.git master

workflows:
  deploy:
    jobs:
      - build-push:
          filters:
            branches:
              only: master
      - update-manifest:
          requires: [build-push]
          filters:
            branches:
              only: master
